<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <link rel="stylesheet" href="css/main.css" />

    <title>FEM | Blog preview card</title>
    <style>
      .attribution {
        font-size: 11px;
        text-align: center;
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }
    </style>
  </head>
  <body>
    <main>
      <article class="card">
        <img
          src="./assets/images/illustration-article.svg"
          alt="Graphic of HTML and CSS"
          class="hero"
        />
        <div class="card_content">
          <div class="card_category"><span class="tag">Learning</span></div>
          <p class="card_date">Published 21 Dec 2023</p>
          <a href="#" class="card_title">HTML &amp; CSS foundations</a>
          <p class="card_description">
            These languages are the backbone of every website, defining
            structure, content, and presentation.
          </p>
        </div>
        <footer class="card_author">
          <img
            src="./assets/images/image-avatar.webp"
            alt="Greg Hooper"
            class="card_avatar"
          />
          <p class="card_author_name">Greg Hooper</p>
        </footer>
      </article>
    </main>

    <div class="attribution">
      Challenge by
      <a
        href="https://www.frontendmentor.io?ref=challenge"
        target="_blank"
        rel="noreferrer noopener"
        >Frontend Mentor</a
      >. Coded by <a href="#">Henri Branken</a>.
    </div>
  </body>
</html>
