<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <link rel="stylesheet" href="css/main.css" />

    <title>FEM | Blog preview card</title>
  </head>
  <body>
    <main>
      <article class="card">
        <a href="#" class="card_link">
          <img
            src="./assets/images/illustration-article.svg"
            alt="Graphic of HTML and CSS"
            class="hero"
          />
          <div class="card_content">
            <div class="card_category"><span class="tag">Learning</span></div>
            <time class="card_date" datetime="2023-12-21"
              >Published 21 Dec 2023</time
            >
            <h1 class="card_title">HTML &amp; CSS foundations</h1>
            <p class="card_description">
              These languages are the backbone of every website, defining
              structure, content, and presentation.
            </p>
          </div>
          <footer class="card_author">
            <img
              src="./assets/images/image-avatar.webp"
              alt=""
              class="card_avatar"
            />
            <p class="card_author_name">Greg Hooper</p>
          </footer>
        </a>
      </article>
    </main>

    <div class="attribution">
      Challenge by
      <a
        href="https://www.frontendmentor.io?ref=challenge"
        target="_blank"
        rel="noreferrer noopener"
        aria-label="Go to the Frontendmentor home page (opens in a new tab)"
        >Frontend Mentor</a
      >. Coded by
      <a
        href="https://github.com/HenriBranken/fem-blog-preview-card"
        target="_blank"
        rel="noreferrer noopener"
        aria-label="Go to the Github repo for this project. (opens in a new tab)"
        >Henri Branken</a
      >.
    </div>
    <!-- https://henribranken.github.io/fem-blog-preview-card/ -->
  </body>
</html>
